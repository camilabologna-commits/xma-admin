<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMA · Administración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/logo.png" alt="XMA" class="logo-img">
    </div>
    <div class="login-sub">Administración</div>
    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" required autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-block" id="login-btn">Ingresar</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="shell">
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="assets/logo.png" alt="XMA" class="logo-img logo-img--white">
      </div>
      <div class="sidebar-sub">Administración</div>
      <nav id="nav-items">
        <div class="nav-item active" data-page="dashboard">Resumen</div>
        <div class="nav-item" data-page="ventas">Ventas</div>
        <div class="nav-item" data-page="stock">Stock</div>
        <div class="nav-item" data-page="clientes">Clientes</div>
        <div class="nav-item" data-page="vendedores">Vendedores</div>
        <div class="nav-item" data-page="estadisticas">Estadísticas</div>
        <div class="nav-item" data-page="dgi">DGI</div>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" id="logout-btn">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-bar">
        <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
        <div class="logo-x" style="font-size:18px;">XMA</div>
        <span style="width:32px;"></span>
      </div>
      <div id="page-content"></div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/ventas.js"></script>
<script src="js/stock.js"></script>
<script src="js/clientes.js"></script>
<script src="js/vendedores.js"></script>
<script src="js/estadisticas.js"></script>
<script src="js/dgi.js"></script>
</body>
</html>
